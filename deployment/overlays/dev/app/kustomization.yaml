apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../app
  - namespace.yaml

namespace: dev

patches:
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: USER_NAMESPACE_ENABLED
          value: "true"

apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-db
spec:
  schedule: "0 1 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: rclone
              image: rclone/rclone:latest
              env:
                - name: S3_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-credentials
                      key: key
                - name: S3_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: s3-credentials
                      key: secret
                - name: S3_URL
                  valueFrom:
                    secretKeyRef:
                      name: s3-credentials
                      key: url
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  
                  cat <<EOF > /tmp/rclone.conf
                  [hetzner]
                  type = s3
                  provider = Other
                  access_key_id = $S3_KEY
                  secret_access_key = $S3_SECRET
                  endpoint = $S3_URL
                  region = eu-central-1
                  force_path_style = true
                  EOF
                  
                  echo Starting db backup.
                  
                  rclone copy --config=/tmp/rclone.conf --backup-dir hetzner:backups/neo4j/archive/$(date +%F)/ /opt/src hetzner:backups/neo4j/current/
                  
                  echo DB backup finished.
              volumeMounts:
                - mountPath: /opt/src
                  name: api-db
          volumes:
            - name: api-db
              persistentVolumeClaim:
                claimName: api-db
          restartPolicy: Never

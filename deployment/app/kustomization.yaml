apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - api-http-route.yaml
  - api-https-route.yaml
  - api-service.yaml
  - api-deployment.yaml
  - db-service.yaml
  - db-pvc.yaml
  - db-deployment.yaml
  - openapi-spec-http-route.yaml
  - openapi-spec-https-route.yaml
  - openapi-spec-service.yaml
  - openapi-spec-deployment.yaml
  - backup-db-cronjob.yaml

secretGenerator:
  - name: api.db-credentials
    envs:
      - .env.secret.db
  - name: api.credentials
    envs:
      - .env.secret.api
  - name: api.s3-credentials
    envs:
      - .env.secret.s3
  - name: api.basic-auth-credentials
    envs:
      - .env.secret.basic-auth
  - name: api.flickr-credentials
    envs:
      - .env.secret.flickr
  - name: api.youtube-credentials
    envs:
      - .env.secret.youtube

patches:
  - path: api-deployment.patch.json
    target:
      kind: Deployment
      name: api
  - path: openapi-spec-deployment.patch.json
    target:
      kind: Deployment
      name: openapi-spec
  - path: api-http-route.patch.json
    target:
      kind: HTTPRoute
      name: api-http
  - path: api-https-route.patch.json
    target:
      kind: HTTPRoute
      name: api-https
  - path: openapi-spec-http-route.patch.json
    target:
      kind: HTTPRoute
      name: openapi-spec-http
  - path: openapi-spec-https-route.patch.json
    target:
      kind: HTTPRoute
      name: openapi-spec-https

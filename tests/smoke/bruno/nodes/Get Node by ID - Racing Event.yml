info:
  name: Get Node by ID - Racing Event
  type: http
  tags:
    - get
    - node
    - valid

http:
  method: GET
  url: "{{baseUrl}}/nodes/{{validRacingEventId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.id
      operator: eq
      value: "{{validRacingEventId}}"
    - expression: res.body.attributes.created_at
      operator: isString
    - expression: res.body.attributes.created_at
      operator: isNotEmpty
    - expression: res.body.attributes.updated_at
      operator: isString
    - expression: res.body.attributes.updated_at
      operator: isNotEmpty
    - expression: res.body.links.self
      operator: isString
    - expression: res.body.links.self
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const RacingEvents = require('./lib/node-types/RacingEvents.js')
        await RacingEvents.create()

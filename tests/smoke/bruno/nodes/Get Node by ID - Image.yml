info:
  name: Get Node by ID - Image
  type: http
  tags:
    - get
    - node
    - valid

http:
  method: GET
  url: "{{baseUrl}}/nodes/{{validImageId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.id
      operator: eq
      value: "{{validImageId}}"
    - expression: res.body.attributes.created_at
      operator: isString
    - expression: res.body.attributes.created_at
      operator: isNotEmpty
    - expression: res.body.attributes.updated_at
      operator: isString
    - expression: res.body.attributes.updated_at
      operator: isNotEmpty
    - expression: res.body.links.self
      operator: isString
    - expression: res.body.links.self
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Images = require('./lib/node-types/Images.js')
        await Images.create()
    - type: after-response
      code: |-
        const Images = require('./lib/node-types/Images.js')
        await Images.delete(bru.getEnvVar('validImageId'))

info:
  name: Create ›made-by-model-car-brand‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/model-cars/{{validModelCarId}}/relationships/made-by-model-car-brand"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "model-car-brands",
          "id": "{{validModelCarBrandId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const ModelCars = require('./lib/node-types/ModelCars.js')
        const ModelCarBrands = require('./lib/node-types/ModelCarBrands.js')
        await ModelCars.create()
        await ModelCarBrands.create()

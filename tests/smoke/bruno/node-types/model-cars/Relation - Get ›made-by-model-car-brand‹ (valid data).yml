info:
  name: Get ›made-by-model-car-brand‹ relation (valid data)
  type: http
  tags:
    - get
    - relation
    - valid

http:
  method: GET
  url: "{{baseUrl}}/model-cars/{{validModelCarId}}/made-by-model-car-brand"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers["content-type"]
      operator: contains
      value: application/vnd.api+json
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.data.id
      operator: gte
      value: "12000000"
    - expression: res.body.data.type
      operator: eq
      value: "model-car-brands"
    - expression: res.body.data.attributes
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/model-cars/{{validModelCarId}}/made-by-model-car-brand"
    - expression: res.body.data.attributes.created_at
      operator: isString
    - expression: res.body.data.attributes.created_at
      operator: isNotEmpty
    - expression: res.body.data.attributes.updated_at
      operator: isString
    - expression: res.body.data.attributes.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const ModelCars = require('./lib/node-types/ModelCars.js')
        const ModelCarBrands = require('./lib/node-types/ModelCarBrands.js')
        await ModelCars.create()
        await ModelCarBrands.create()
        await ModelCars.createMadeByModelCarBrandRelationship()

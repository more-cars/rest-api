info:
  name: Get ›made-by-model-car-brand‹ relation (valid data)
  type: http
  tags:
    - get
    - relation
    - valid

http:
  method: GET
  url: "{{baseUrl}}/model-cars/{{validModelCarId}}/made-by-model-car-brand"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.data.relationship_id
      operator: gte
      value: "12000000"
    - expression: res.body.data.relationship_name
      operator: eq
      value: "made-by-model-car-brand"
    - expression: res.body.data.start_node
      operator: isJson
    - expression: res.body.data.start_node.node_type
      operator: eq
      value: "model-cars"
    - expression: res.body.data.start_node.data.id
      operator: eq
      value: "{{validModelCarId}}"
    - expression: res.body.data.partner_node
      operator: isJson
    - expression: res.body.data.partner_node.node_type
      operator: eq
      value: "model-car-brands"
    - expression: res.body.data.partner_node.data.id
      operator: eq
      value: "{{validModelCarBrandId}}"
    - expression: res.body.data.created_at
      operator: isString
    - expression: res.body.data.created_at
      operator: isNotEmpty
    - expression: res.body.data.updated_at
      operator: isString
    - expression: res.body.data.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const ModelCars = require('./lib/node-types/ModelCars.js')
        const ModelCarBrands = require('./lib/node-types/ModelCarBrands.js')
        await ModelCars.create()
        await ModelCarBrands.create()
        await ModelCars.createMadeByModelCarBrandRelationship()

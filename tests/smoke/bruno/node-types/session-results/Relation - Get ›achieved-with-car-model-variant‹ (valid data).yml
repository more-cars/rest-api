info:
  name: Get ›achieved-with-car-model-variant‹ relation (valid data)
  type: http
  tags:
    - get
    - relation
    - valid

http:
  method: GET
  url: "{{baseUrl}}/session-results/{{validSessionResultId}}/achieved-with-car-model-variant"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/session-results/{{validSessionResultId}}/achieved-with-car-model-variant"
    - expression: res.body.data.attributes
      operator: isJson
    - expression: res.body.data.type
      operator: eq
      value: "car-model-variants"
    - expression: res.body.data.id
      operator: eq
      value: "{{validCarModelVariantId}}"
    - expression: res.body.data.created_at
      operator: isString
    - expression: res.body.data.created_at
      operator: isNotEmpty
    - expression: res.body.data.updated_at
      operator: isString
    - expression: res.body.data.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const SessionResults = require('./lib/node-types/SessionResults.js')
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        await SessionResults.create()
        await CarModelVariants.create()
        await SessionResults.createAchievedWithCarModelVariantRelationship()

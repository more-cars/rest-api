info:
  name: Create ›belongs-to-racing-session‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/session-results/{{validSessionResultId}}/relationships/belongs-to-racing-session"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "belongs-to-racing-session",
          "id": "{{validRacingSessionId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const SessionResults = require('./lib/node-types/SessionResults.js')
        const RacingSessions = require('./lib/node-types/RacingSessions.js')
        await SessionResults.create()
        await RacingSessions.create()

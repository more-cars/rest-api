info:
  name: Get ›belongs-to-racing-session‹ relation (valid data)
  type: http
  tags:
    - get
    - relation
    - valid

http:
  method: GET
  url: "{{baseUrl}}/session-results/{{validSessionResultId}}/belongs-to-racing-session"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/session-results/{{validSessionResultId}}/belongs-to-racing-session"
    - expression: res.body.data.attributes
      operator: isJson
    - expression: res.body.data.type
      operator: eq
      value: "racing-sessions"
    - expression: res.body.data.id
      operator: eq
      value: "{{validRacingSessionId}}"
    - expression: res.body.data.attributes.created_at
      operator: isString
    - expression: res.body.data.attributes.created_at
      operator: isNotEmpty
    - expression: res.body.data.attributes.updated_at
      operator: isString
    - expression: res.body.data.attributes.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const SessionResults = require('./lib/node-types/SessionResults.js')
        const RacingSessions = require('./lib/node-types/RacingSessions.js')
        await SessionResults.create()
        await RacingSessions.create()
        await SessionResults.createBelongsToRacingSessionRelationship()

info:
  name: Get all Session Results (invalid filter)
  type: http
  tags:
    - get
    - node
    - collection
    - filter
    - invalid

http:
  method: GET
  url: "{{baseUrl}}/session-results?filter_by_property=blubb"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body.errors
      operator: isArray
    - expression: res.body.errors[0].status
      operator: isNotEmpty
    - expression: res.body.errors[0].title
      operator: isNotEmpty
    - expression: res.body.errors[0].detail
      operator: isNotEmpty

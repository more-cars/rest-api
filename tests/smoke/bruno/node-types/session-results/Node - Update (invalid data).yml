info:
  name: Update Session Result (invalid data)
  type: http
  tags:
    - update
    - node
    - invalid

http:
  method: PATCH
  url: "{{baseUrl}}/session-results/{{validSessionResultId}}"
  body:
    type: json
    data: |-
      {
        "driver_name": null
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body.errors
      operator: isArray
    - expression: res.body.errors[0].status
      operator: isNotEmpty
    - expression: res.body.errors[0].title
      operator: isNotEmpty
    - expression: res.body.errors[0].detail
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const SessionResults = require('./lib/node-types/SessionResults.js')
        await SessionResults.create()

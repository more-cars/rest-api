info:
  name: Create ›has-lap-time‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/session-results/{{validSessionResultId}}/relationships/has-lap-time"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "has-lap-time",
          "id": "{{validLapTimeId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const SessionResults = require('./lib/node-types/SessionResults.js')
        const LapTimes = require('./lib/node-types/LapTimes.js')
        await SessionResults.create()
        await LapTimes.create()

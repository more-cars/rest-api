info:
  name: Create ›by-magazine-issue‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/ratings/{{validRatingId}}/relationships/by-magazine-issue"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "magazine-issues",
          "id": "{{validMagazineIssueId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Ratings = require('./lib/node-types/Ratings.js')
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        await Ratings.create()
        await MagazineIssues.create()

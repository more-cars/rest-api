info:
  name: Create ›by-magazine-issue‹ relation (invalid data)
  type: http
  tags:
    - create
    - relation
    - invalid

http:
  method: POST
  url: "{{baseUrl}}/ratings/{{invalidRatingId}}/by-magazine-issue/{{invalidMagazineIssueId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"
    - expression: res.body
      operator: isString
    - expression: res.body
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Ids = require('./lib/Ids.js')
        await Ids.generateInvalidId('Rating')
        await Ids.generateInvalidId('MagazineIssue')

info:
  name: Get all Ratings
  type: http
  tags:
    - get
    - node
    - collection
    - valid

http:
  method: GET
  url: "{{baseUrl}}/ratings"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.data
      operator: isArray
    - expression: res.body.data[0].attributes
      operator: isJson
    - expression: res.body.data[0].id
      operator: gte
      value: "12000000"
    - expression: res.body.meta.page.total_nodes
      operator: isNumber
  scripts:
    - type: before-request
      code: |-
        const Ratings = require('./lib/node-types/Ratings.js')
        await Ratings.create()

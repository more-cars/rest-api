info:
  name: Get ›for-car-model-variant‹ relation (valid data)
  type: http
  tags:
    - get
    - relation
    - valid

http:
  method: GET
  url: "{{baseUrl}}/ratings/{{validRatingId}}/for-car-model-variant"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.data.relationship_id
      operator: gte
      value: "12000000"
    - expression: res.body.data.relationship_name
      operator: eq
      value: "for-car-model-variant"
    - expression: res.body.data.start_node
      operator: isJson
    - expression: res.body.data.start_node.node_type
      operator: eq
      value: "ratings"
    - expression: res.body.data.start_node.data.id
      operator: eq
      value: "{{validRatingId}}"
    - expression: res.body.data.partner_node
      operator: isJson
    - expression: res.body.data.partner_node.node_type
      operator: eq
      value: "car-model-variants"
    - expression: res.body.data.partner_node.data.id
      operator: eq
      value: "{{validCarModelVariantId}}"
    - expression: res.body.data.created_at
      operator: isString
    - expression: res.body.data.created_at
      operator: isNotEmpty
    - expression: res.body.data.updated_at
      operator: isString
    - expression: res.body.data.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Ratings = require('./lib/node-types/Ratings.js')
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        await Ratings.create()
        await CarModelVariants.create()
        await Ratings.createForCarModelVariantRelationship()

info:
  name: Create Rating (ignored data)
  type: http
  tags:
    - create
    - node
    - valid

http:
  method: POST
  url: "{{baseUrl}}/ratings"
  body:
    type: json
    data: |-
      {
        "rating_value": 93,
        "scale_minimum": 0,
        "scale_maximum": 100,
        "scale_direction": "up",
        "created_at": "nope",
        "updated_at": "nonono"
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.body.attributes.created_at
      operator: neq
      value: nope
    - expression: res.body.attributes.updated_at
      operator: neq
      value: nonono

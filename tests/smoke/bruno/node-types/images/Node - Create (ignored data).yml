info:
  name: Create Image (ignored data)
  type: http
  tags:
    - create
    - node
    - valid

http:
  method: POST
  url: "{{baseUrl}}/images"
  body:
    type: json
    data: |-
      {
        "image_provider": "wikimedia",
        "external_id": "2011-03-04 Autosalon Genf 1391.JPG",
        "name": "nein",
        "my_property": "no",
        "created_at": "nope",
        "updated_at": "nonono"
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.body.attributes.created_at
      operator: neq
      value: nope
    - expression: res.body.attributes.updated_at
      operator: neq
      value: nonono
  scripts:
    - type: after-response
      code: |-
        const Images = require('./lib/node-types/Images.js')
        await Images.delete(res.body.id)
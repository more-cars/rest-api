info:
  name: Create Image (valid data)
  type: http
  tags:
    - create
    - node
    - valid

http:
  method: POST
  url: "{{baseUrl}}/images"
  body:
    type: json
    data: |-
      {
        "image_provider": "wikimedia",
        "external_id": "2011-03-04 Autosalon Genf 1391.JPG"
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.body
      operator: isJson
    - expression: res.body.id
      operator: gte
      value: "12000000"
  scripts:
    - type: tests
      code: |-
        test("both timestamps should be identical", function () {
          const data = res.getBody()
          expect(data.attributes.created_at).to.eql(data.attributes.updated_at)
        })
    - type: after-response
      code: |-
        const Images = require('./lib/node-types/Images.js')
        await Images.delete(res.body.id)

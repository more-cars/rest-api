info:
  name: Create ›belongs-to-node‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/images/{{validImageId}}/relationships/belongs-to-node"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "brands",
          "id": "{{validBrandId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Images = require('./lib/node-types/Images.js')
        const Brands = require('./lib/node-types/Brands.js')
        await Images.create()
        await Brands.create()
    - type: after-response
      code: |-
        const Images = require('./lib/node-types/Images.js')
        await Images.delete(bru.getEnvVar('validImageId'))

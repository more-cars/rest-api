info:
  name: Delete ›has-video‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/programmes/{{validProgrammeId}}/has-video/{{validVideoId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const Programmes = require('./lib/node-types/Programmes.js')
        const Videos = require('./lib/node-types/Videos.js')
        await Programmes.create()
        await Videos.create()
        await Programmes.createHasVideoRelationship()

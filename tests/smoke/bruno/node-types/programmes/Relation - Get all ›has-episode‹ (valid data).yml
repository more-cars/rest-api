info:
  name: Get all ›has-episode‹ relations (valid data)
  type: http
  tags:
    - get
    - relation
    - collection
    - valid

http:
  method: GET
  url: "{{baseUrl}}/programmes/{{validProgrammeId}}/has-episode"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers["content-type"]
      operator: contains
      value: application/vnd.api+json
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isArray
    - expression: res.body.data[0].id
      operator: gte
      value: "12000000"
    - expression: res.body.data[0].type
      operator: eq
      value: "programme-episodes"
    - expression: res.body.data[0].attributes
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/programmes/{{validProgrammeId}}/has-episode"
    - expression: res.body.data[0].attributes.created_at
      operator: isString
    - expression: res.body.data[0].attributes.created_at
      operator: isNotEmpty
    - expression: res.body.data[0].attributes.updated_at
      operator: isString
    - expression: res.body.data[0].attributes.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Programmes = require('./lib/node-types/Programmes.js')
        const ProgrammeEpisodes = require('./lib/node-types/ProgrammeEpisodes.js')
        await Programmes.create()
        await ProgrammeEpisodes.create()
        await Programmes.createHasEpisodeRelationship()

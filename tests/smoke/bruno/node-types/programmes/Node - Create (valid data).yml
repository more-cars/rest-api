info:
  name: Create Programme (valid data)
  type: http
  tags:
    - create
    - node
    - valid

http:
  method: POST
  url: "{{baseUrl}}/programmes"
  body:
    type: json
    data: |-
      {
        "name": "Top Gear",
        "aired_from_year": 2002,
        "aired_until_year": 2022,
        "channel": "BBC Two",
        "total_seasons": 33,
        "total_episodes": 240,
        "regular_episode_running_time": "PT60M"
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.body
      operator: isJson
    - expression: res.body.id
      operator: gte
      value: "12000000"
  scripts:
    - type: tests
      code: |-
        test("both timestamps should be identical", function () {
          const data = res.getBody()
          expect(data.attributes.created_at).to.eql(data.attributes.updated_at)
        })

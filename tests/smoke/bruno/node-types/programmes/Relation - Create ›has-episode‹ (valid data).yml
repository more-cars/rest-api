info:
  name: Create ›has-episode‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/programmes/{{validProgrammeId}}/relationships/has-episode"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "programme-episodes",
          "id": "{{validProgrammeEpisodeId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Programmes = require('./lib/node-types/Programmes.js')
        const ProgrammeEpisodes = require('./lib/node-types/ProgrammeEpisodes.js')
        await Programmes.create()
        await ProgrammeEpisodes.create()

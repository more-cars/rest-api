info:
  name: Get all Programmes (valid filter)
  type: http
  tags:
    - get
    - node
    - collection
    - filter
    - valid

http:
  method: GET
  url: "{{baseUrl}}/programmes?filter_by_property=id&filter_value=1234&filter_operator=gte"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.data
      operator: isArray
    - expression: res.body.meta.page.current
      operator: isNumber
    - expression: res.body.meta.page.size
      operator: isNumber
    - expression: res.body.meta.page.total_pages
      operator: isNumber
    - expression: res.body.meta.page.total_nodes
      operator: isNumber
    - expression: res.body.links.self
      operator: isString
    - expression: res.body.links.first
      operator: isString
    - expression: res.body.links.prev
      operator: isString
    - expression: res.body.links.next
      operator: isString
    - expression: res.body.links.last
      operator: isString

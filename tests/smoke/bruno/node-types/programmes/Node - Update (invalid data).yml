info:
  name: Update Programme (invalid data)
  type: http
  tags:
    - update
    - node
    - invalid

http:
  method: PATCH
  url: "{{baseUrl}}/programmes/{{validProgrammeId}}"
  body:
    type: json
    data: |-
      {
        "name": null
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body
      operator: isString
  scripts:
    - type: before-request
      code: |-
        const Programmes = require('./lib/node-types/Programmes.js')
        await Programmes.create()

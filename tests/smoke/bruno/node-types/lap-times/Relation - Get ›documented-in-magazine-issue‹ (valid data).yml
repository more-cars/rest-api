info:
  name: Get ›documented-in-magazine-issue‹ relation (valid data)
  type: http
  tags:
    - get
    - relation
    - valid

http:
  method: GET
  url: "{{baseUrl}}/lap-times/{{validLapTimeId}}/documented-in-magazine-issue"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers["content-type"]
      operator: contains
      value: application/vnd.api+json
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.data.id
      operator: gte
      value: "12000000"
    - expression: res.body.data.type
      operator: eq
      value: "magazine-issues"
    - expression: res.body.data.attributes
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/lap-times/{{validLapTimeId}}/documented-in-magazine-issue"
    - expression: res.body.data.attributes.created_at
      operator: isString
    - expression: res.body.data.attributes.created_at
      operator: isNotEmpty
    - expression: res.body.data.attributes.updated_at
      operator: isString
    - expression: res.body.data.attributes.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const LapTimes = require('./lib/node-types/LapTimes.js')
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        await LapTimes.create()
        await MagazineIssues.create()
        await LapTimes.createDocumentedInMagazineIssueRelationship()

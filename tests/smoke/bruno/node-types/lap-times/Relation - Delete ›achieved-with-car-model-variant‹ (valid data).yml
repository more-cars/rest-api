info:
  name: Delete ›achieved-with-car-model-variant‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/lap-times/{{validLapTimeId}}/relationships/achieved-with-car-model-variant"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "achieved-with-car-model-variant",
          "id": "{{validCarModelVariantId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const LapTimes = require('./lib/node-types/LapTimes.js')
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        await LapTimes.create()
        await CarModelVariants.create()
        await LapTimes.createAchievedWithCarModelVariantRelationship()

info:
  name: Delete ›documented-in-magazine-issue‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/lap-times/{{validLapTimeId}}/documented-in-magazine-issue/{{validMagazineIssueId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const LapTimes = require('./lib/node-types/LapTimes.js')
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        await LapTimes.create()
        await MagazineIssues.create()
        await LapTimes.createDocumentedInMagazineIssueRelationship()

info:
  name: Create ›belongs-to-session-result‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/lap-times/{{validLapTimeId}}/relationships/belongs-to-session-result"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "session-results",
          "id": "{{validSessionResultId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const LapTimes = require('./lib/node-types/LapTimes.js')
        const SessionResults = require('./lib/node-types/SessionResults.js')
        await LapTimes.create()
        await SessionResults.create()

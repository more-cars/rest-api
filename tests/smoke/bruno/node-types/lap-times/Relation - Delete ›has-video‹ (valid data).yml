info:
  name: Delete ›has-video‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/lap-times/{{validLapTimeId}}/relationships/has-video"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "has-video",
          "id": "{{validVideoId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const LapTimes = require('./lib/node-types/LapTimes.js')
        const Videos = require('./lib/node-types/Videos.js')
        await LapTimes.create()
        await Videos.create()
        await LapTimes.createHasVideoRelationship()
    - type: after-response
      code: |-
        const Videos = require('./lib/node-types/Videos.js')
        await Videos.delete(bru.getEnvVar('validVideoId'))

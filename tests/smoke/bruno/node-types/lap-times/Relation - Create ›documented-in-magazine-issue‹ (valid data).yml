info:
  name: Create ›documented-in-magazine-issue‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/lap-times/{{validLapTimeId}}/relationships/documented-in-magazine-issue"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "documented-in-magazine-issue",
          "id": "{{validMagazineIssueId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const LapTimes = require('./lib/node-types/LapTimes.js')
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        await LapTimes.create()
        await MagazineIssues.create()

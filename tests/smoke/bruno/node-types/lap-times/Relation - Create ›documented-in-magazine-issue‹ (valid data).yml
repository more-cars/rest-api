info:
  name: Create ›documented-in-magazine-issue‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/lap-times/{{validLapTimeId}}/documented-in-magazine-issue/{{validMagazineIssueId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.data.relationship_id
      operator: gte
      value: "12000000"
    - expression: res.body.data.relationship_name
      operator: eq
      value: "documented-in-magazine-issue"
    - expression: res.body.data.start_node
      operator: isJson
    - expression: res.body.data.start_node.node_type
      operator: eq
      value: "lap-times"
    - expression: res.body.data.start_node.data.id
      operator: eq
      value: "{{validLapTimeId}}"
    - expression: res.body.data.partner_node
      operator: isJson
    - expression: res.body.data.partner_node.node_type
      operator: eq
      value: "magazine-issues"
    - expression: res.body.data.partner_node.data.id
      operator: eq
      value: "{{validMagazineIssueId}}"
    - expression: res.body.data.created_at
      operator: isString
    - expression: res.body.data.created_at
      operator: isNotEmpty
    - expression: res.body.data.updated_at
      operator: isString
    - expression: res.body.data.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const LapTimes = require('./lib/node-types/LapTimes.js')
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        await LapTimes.create()
        await MagazineIssues.create()

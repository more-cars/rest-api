info:
  name: Get all Lap Times
  type: http
  tags:
    - get
    - node
    - collection
    - valid

http:
  method: GET
  url: "{{baseUrl}}/lap-times"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.data
      operator: isArray
    - expression: res.body.data[0].attributes
      operator: isJson
    - expression: res.body.data[0].id
      operator: gte
      value: "12000000"
    - expression: res.body.meta.total
      operator: isNumber
  scripts:
    - type: before-request
      code: |-
        const LapTimes = require('./lib/node-types/LapTimes.js')
        await LapTimes.create()

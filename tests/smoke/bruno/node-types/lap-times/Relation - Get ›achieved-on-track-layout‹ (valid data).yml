info:
  name: Get ›achieved-on-track-layout‹ relation (valid data)
  type: http
  tags:
    - get
    - relation
    - valid

http:
  method: GET
  url: "{{baseUrl}}/lap-times/{{validLapTimeId}}/achieved-on-track-layout"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers["content-type"]
      operator: contains
      value: application/vnd.api+json
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/lap-times/{{validLapTimeId}}/achieved-on-track-layout"
    - expression: res.body.data.attributes
      operator: isJson
    - expression: res.body.data.type
      operator: eq
      value: "track-layouts"
    - expression: res.body.data.id
      operator: eq
      value: "{{validTrackLayoutId}}"
    - expression: res.body.data.attributes.created_at
      operator: isString
    - expression: res.body.data.attributes.created_at
      operator: isNotEmpty
    - expression: res.body.data.attributes.updated_at
      operator: isString
    - expression: res.body.data.attributes.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const LapTimes = require('./lib/node-types/LapTimes.js')
        const TrackLayouts = require('./lib/node-types/TrackLayouts.js')
        await LapTimes.create()
        await TrackLayouts.create()
        await LapTimes.createAchievedOnTrackLayoutRelationship()

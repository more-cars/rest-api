info:
  name: Delete ›achieved-on-track-layout‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/lap-times/{{validLapTimeId}}/relationships/achieved-on-track-layout"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "track-layouts",
          "id": "{{validTrackLayoutId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const LapTimes = require('./lib/node-types/LapTimes.js')
        const TrackLayouts = require('./lib/node-types/TrackLayouts.js')
        await LapTimes.create()
        await TrackLayouts.create()
        await LapTimes.createAchievedOnTrackLayoutRelationship()

info:
  name: Create ›presents-car-model-variant‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/motor-shows/{{validMotorShowId}}/presents-car-model-variant/{{validCarModelVariantId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.data.relationship_id
      operator: gte
      value: "12000000"
    - expression: res.body.data.relationship_name
      operator: eq
      value: "presents-car-model-variant"
    - expression: res.body.data.start_node
      operator: isJson
    - expression: res.body.data.start_node.node_type
      operator: eq
      value: "motor-shows"
    - expression: res.body.data.start_node.data.id
      operator: eq
      value: "{{validMotorShowId}}"
    - expression: res.body.data.partner_node
      operator: isJson
    - expression: res.body.data.partner_node.node_type
      operator: eq
      value: "car-model-variants"
    - expression: res.body.data.partner_node.data.id
      operator: eq
      value: "{{validCarModelVariantId}}"
    - expression: res.body.data.created_at
      operator: isString
    - expression: res.body.data.created_at
      operator: isNotEmpty
    - expression: res.body.data.updated_at
      operator: isString
    - expression: res.body.data.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const MotorShows = require('./lib/node-types/MotorShows.js')
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        await MotorShows.create()
        await CarModelVariants.create()

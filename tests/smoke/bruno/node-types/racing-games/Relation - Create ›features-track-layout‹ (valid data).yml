info:
  name: Create ›features-track-layout‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/racing-games/{{validRacingGameId}}/relationships/features-track-layout"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "track-layouts",
          "id": "{{validTrackLayoutId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const RacingGames = require('./lib/node-types/RacingGames.js')
        const TrackLayouts = require('./lib/node-types/TrackLayouts.js')
        await RacingGames.create()
        await TrackLayouts.create()

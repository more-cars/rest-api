info:
  name: Create ›features-car-model-variant‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/racing-games/{{validRacingGameId}}/relationships/features-car-model-variant"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "car-model-variants",
          "id": "{{validCarModelVariantId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const RacingGames = require('./lib/node-types/RacingGames.js')
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        await RacingGames.create()
        await CarModelVariants.create()

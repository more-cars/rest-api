info:
  name: Delete ›released-on-gaming-platform‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/racing-games/{{validRacingGameId}}/relationships/released-on-gaming-platform"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "released-on-gaming-platform",
          "id": "{{validGamingPlatformId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const RacingGames = require('./lib/node-types/RacingGames.js')
        const GamingPlatforms = require('./lib/node-types/GamingPlatforms.js')
        await RacingGames.create()
        await GamingPlatforms.create()
        await RacingGames.createReleasedOnGamingPlatformRelationship()

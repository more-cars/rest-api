info:
  name: Delete ›has-main-video‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/track-layouts/{{validTrackLayoutId}}/has-main-video/{{validVideoId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const TrackLayouts = require('./lib/node-types/TrackLayouts.js')
        const Videos = require('./lib/node-types/Videos.js')
        await TrackLayouts.create()
        await Videos.create()
        await TrackLayouts.createHasMainVideoRelationship()
    - type: after-response
      code: |-
        const Videos = require('./lib/node-types/Videos.js')
        await Videos.delete(bru.getEnvVar('validVideoId'))

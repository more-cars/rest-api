info:
  name: Create ›has-video‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/track-layouts/{{validTrackLayoutId}}/relationships/has-video"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "has-video",
          "id": "{{validVideoId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const TrackLayouts = require('./lib/node-types/TrackLayouts.js')
        const Videos = require('./lib/node-types/Videos.js')
        await TrackLayouts.create()
        await Videos.create()
    - type: after-response
      code: |-
        const Videos = require('./lib/node-types/Videos.js')
        await Videos.delete(bru.getEnvVar('validVideoId'))

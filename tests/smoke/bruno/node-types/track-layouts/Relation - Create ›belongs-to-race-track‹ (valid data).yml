info:
  name: Create ›belongs-to-race-track‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/track-layouts/{{validTrackLayoutId}}/relationships/belongs-to-race-track"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "belongs-to-race-track",
          "id": "{{validRaceTrackId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const TrackLayouts = require('./lib/node-types/TrackLayouts.js')
        const RaceTracks = require('./lib/node-types/RaceTracks.js')
        await TrackLayouts.create()
        await RaceTracks.create()

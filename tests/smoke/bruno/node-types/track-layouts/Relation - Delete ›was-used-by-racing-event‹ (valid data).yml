info:
  name: Delete ›was-used-by-racing-event‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/track-layouts/{{validTrackLayoutId}}/relationships/was-used-by-racing-event"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "was-used-by-racing-event",
          "id": "{{validRacingEventId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const TrackLayouts = require('./lib/node-types/TrackLayouts.js')
        const RacingEvents = require('./lib/node-types/RacingEvents.js')
        await TrackLayouts.create()
        await RacingEvents.create()
        await TrackLayouts.createWasUsedByRacingEventRelationship()

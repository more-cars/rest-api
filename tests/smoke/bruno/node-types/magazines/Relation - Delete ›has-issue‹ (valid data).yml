info:
  name: Delete ›has-issue‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/magazines/{{validMagazineId}}/relationships/has-issue"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "has-issue",
          "id": "{{validMagazineIssueId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Magazines = require('./lib/node-types/Magazines.js')
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        await Magazines.create()
        await MagazineIssues.create()
        await Magazines.createHasIssueRelationship()

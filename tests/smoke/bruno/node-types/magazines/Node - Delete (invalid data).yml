info:
  name: Delete Magazine (invalid data)
  type: http
  tags:
    - delete
    - node
    - invalid

http:
  method: DELETE
  url: "{{baseUrl}}/magazines/{{invalidMagazineId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"
    - expression: res.body.errors
      operator: isArray
    - expression: res.body.errors[0].status
      operator: isNotEmpty
    - expression: res.body.errors[0].title
      operator: isNotEmpty
    - expression: res.body.errors[0].detail
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Ids = require('./lib/Ids.js')
        await Ids.generateInvalidId('Magazine')

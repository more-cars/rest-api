info:
  name: Delete ›has-video‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/racing-series/{{validRacingSeriesId}}/has-video/{{validVideoId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const RacingSeries = require('./lib/node-types/RacingSeries.js')
        const Videos = require('./lib/node-types/Videos.js')
        await RacingSeries.create()
        await Videos.create()
        await RacingSeries.createHasVideoRelationship()

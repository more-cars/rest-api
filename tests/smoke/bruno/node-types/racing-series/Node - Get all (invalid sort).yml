info:
  name: Get all Racing Series (invalid sort)
  type: http
  tags:
    - get
    - node
    - collection
    - sorting
    - invalid

http:
  method: GET
  url: "{{baseUrl}}/racing-series?sort_by_property=blubb"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.headers["content-type"]
      operator: contains
      value: application/vnd.api+json
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
    - expression: res.body.errors
      operator: isArray
    - expression: res.body.errors[0].status
      operator: isNotEmpty
    - expression: res.body.errors[0].title
      operator: isNotEmpty
    - expression: res.body.errors[0].detail
      operator: isNotEmpty

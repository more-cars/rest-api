info:
  name: Get all Racing Series (valid page)
  type: http
  tags:
    - get
    - node
    - collection
    - pagination
    - valid

http:
  method: GET
  url: "{{baseUrl}}/racing-series?page=2"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.data
      operator: isArray
    - expression: res.body.meta.page.current
      operator: isNumber
    - expression: res.body.meta.page.size
      operator: isNumber
    - expression: res.body.meta.page.total_pages
      operator: isNumber
    - expression: res.body.meta.page.total_nodes
      operator: isNumber
    - expression: res.body.meta.links.self
      operator: isString
    - expression: res.body.meta.links.first
      operator: isString

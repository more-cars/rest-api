info:
  name: Create ›features-racing-game‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/gaming-platforms/{{validGamingPlatformId}}/relationships/features-racing-game"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "features-racing-game",
          "id": "{{validRacingGameId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const GamingPlatforms = require('./lib/node-types/GamingPlatforms.js')
        const RacingGames = require('./lib/node-types/RacingGames.js')
        await GamingPlatforms.create()
        await RacingGames.create()

info:
  name: Get all ›features-racing-game‹ relations (valid data)
  type: http
  tags:
    - get
    - relation
    - collection
    - valid

http:
  method: GET
  url: "{{baseUrl}}/gaming-platforms/{{validGamingPlatformId}}/features-racing-game"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isArray
    - expression: res.body.data[0].id
      operator: gte
      value: "12000000"
    - expression: res.body.data[0].type
      operator: eq
      value: "racing-games"
    - expression: res.body.data[0].attributes
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/gaming-platforms/{{validGamingPlatformId}}/features-racing-game"
    - expression: res.body.data[0].attributes.created_at
      operator: isString
    - expression: res.body.data[0].attributes.created_at
      operator: isNotEmpty
    - expression: res.body.data[0].attributes.updated_at
      operator: isString
    - expression: res.body.data[0].attributes.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const GamingPlatforms = require('./lib/node-types/GamingPlatforms.js')
        const RacingGames = require('./lib/node-types/RacingGames.js')
        await GamingPlatforms.create()
        await RacingGames.create()
        await GamingPlatforms.createFeaturesRacingGameRelationship()

info:
  name: Get ›belongs-to-brand‹ relation (valid data)
  type: http
  tags:
    - get
    - relation
    - valid

http:
  method: GET
  url: "{{baseUrl}}/car-models/{{validCarModelId}}/belongs-to-brand"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/car-models/{{validCarModelId}}/belongs-to-brand"
    - expression: res.body.data.attributes
      operator: isJson
    - expression: res.body.data.type
      operator: eq
      value: "brands"
    - expression: res.body.data.id
      operator: eq
      value: "{{validBrandId}}"
    - expression: res.body.data.created_at
      operator: isString
    - expression: res.body.data.created_at
      operator: isNotEmpty
    - expression: res.body.data.updated_at
      operator: isString
    - expression: res.body.data.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const CarModels = require('./lib/node-types/CarModels.js')
        const Brands = require('./lib/node-types/Brands.js')
        await CarModels.create()
        await Brands.create()
        await CarModels.createBelongsToBrandRelationship()

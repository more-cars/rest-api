info:
  name: Create ›covered-by-magazine-issue‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/car-models/{{validCarModelId}}/relationships/covered-by-magazine-issue"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "covered-by-magazine-issue",
          "id": "{{validMagazineIssueId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const CarModels = require('./lib/node-types/CarModels.js')
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        await CarModels.create()
        await MagazineIssues.create()

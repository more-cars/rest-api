info:
  name: Get ›is-successor-of‹ relation (valid data)
  type: http
  tags:
    - get
    - relation
    - valid

http:
  method: GET
  url: "{{baseUrl}}/car-models/{{validCarModelId}}/is-successor-of"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers["content-type"]
      operator: contains
      value: application/vnd.api+json
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/car-models/{{validCarModelId}}/is-successor-of"
    - expression: res.body.data.attributes
      operator: isJson
    - expression: res.body.data.type
      operator: eq
      value: "car-models"
    - expression: res.body.data.id
      operator: eq
      value: "{{validSecondCarModelId}}"
    - expression: res.body.data.attributes.created_at
      operator: isString
    - expression: res.body.data.attributes.created_at
      operator: isNotEmpty
    - expression: res.body.data.attributes.updated_at
      operator: isString
    - expression: res.body.data.attributes.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const CarModels = require('./lib/node-types/CarModels.js')
        await CarModels.create()
        await CarModels.create('Second')
        await CarModels.createIsSuccessorOfRelationship()

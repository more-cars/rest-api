info:
  name: Delete ›has-successor‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/car-models/{{validCarModelId}}/relationships/has-successor"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "has-successor",
          "id": "{{validSecondCarModelId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const CarModels = require('./lib/node-types/CarModels.js')
        await CarModels.create()
        await CarModels.create('Second')
        await CarModels.createHasSuccessorRelationship()

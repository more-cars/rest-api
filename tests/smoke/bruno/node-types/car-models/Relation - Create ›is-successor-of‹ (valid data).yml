info:
  name: Create ›is-successor-of‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/car-models/{{validCarModelId}}/relationships/is-successor-of"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "is-successor-of",
          "id": "{{validSecondCarModelId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const CarModels = require('./lib/node-types/CarModels.js')
        await CarModels.create()
        await CarModels.create('Second')

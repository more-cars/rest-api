info:
  name: Delete ›belongs-to-company‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/brands/{{validBrandId}}/relationships/belongs-to-company"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "companies",
          "id": "{{validCompanyId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Brands = require('./lib/node-types/Brands.js')
        const Companies = require('./lib/node-types/Companies.js')
        await Brands.create()
        await Companies.create()
        await Brands.createBelongsToCompanyRelationship()

info:
  name: Get ›has-prime-image‹ relation (valid data)
  type: http
  tags:
    - get
    - relation
    - valid

http:
  method: GET
  url: "{{baseUrl}}/brands/{{validBrandId}}/has-prime-image"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/brands/{{validBrandId}}/has-prime-image"
    - expression: res.body.data.attributes
      operator: isJson
    - expression: res.body.data.type
      operator: eq
      value: "images"
    - expression: res.body.data.id
      operator: eq
      value: "{{validImageId}}"
    - expression: res.body.data.attributes.created_at
      operator: isString
    - expression: res.body.data.attributes.created_at
      operator: isNotEmpty
    - expression: res.body.data.attributes.updated_at
      operator: isString
    - expression: res.body.data.attributes.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Brands = require('./lib/node-types/Brands.js')
        const Images = require('./lib/node-types/Images.js')
        await Brands.create()
        await Images.create()
        await Brands.createHasPrimeImageRelationship()
    - type: after-response
      code: |-
        const Images = require('./lib/node-types/Images.js')
        await Images.delete(bru.getEnvVar('validImageId'))

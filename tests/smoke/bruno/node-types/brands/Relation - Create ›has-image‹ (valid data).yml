info:
  name: Create ›has-image‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/brands/{{validBrandId}}/relationships/has-image"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "has-image",
          "id": "{{validImageId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Brands = require('./lib/node-types/Brands.js')
        const Images = require('./lib/node-types/Images.js')
        await Brands.create()
        await Images.create()
    - type: after-response
      code: |-
        const Images = require('./lib/node-types/Images.js')
        await Images.delete(bru.getEnvVar('validImageId'))

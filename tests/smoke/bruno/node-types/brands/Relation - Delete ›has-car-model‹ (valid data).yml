info:
  name: Delete ›has-car-model‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/brands/{{validBrandId}}/relationships/has-car-model"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "has-car-model",
          "id": "{{validCarModelId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Brands = require('./lib/node-types/Brands.js')
        const CarModels = require('./lib/node-types/CarModels.js')
        await Brands.create()
        await CarModels.create()
        await Brands.createHasCarModelRelationship()

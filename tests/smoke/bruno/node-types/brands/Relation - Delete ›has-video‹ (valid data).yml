info:
  name: Delete ›has-video‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/brands/{{validBrandId}}/relationships/has-video"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "has-video",
          "id": "{{validVideoId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const Brands = require('./lib/node-types/Brands.js')
        const Videos = require('./lib/node-types/Videos.js')
        await Brands.create()
        await Videos.create()
        await Brands.createHasVideoRelationship()
    - type: after-response
      code: |-
        const Videos = require('./lib/node-types/Videos.js')
        await Videos.delete(bru.getEnvVar('validVideoId'))

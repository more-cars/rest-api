info:
  name: Create ›follows-issue‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/magazine-issues/{{validMagazineIssueId}}/relationships/follows-issue"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "follows-issue",
          "id": "{{validSecondMagazineIssueId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        await MagazineIssues.create()
        await MagazineIssues.create('Second')

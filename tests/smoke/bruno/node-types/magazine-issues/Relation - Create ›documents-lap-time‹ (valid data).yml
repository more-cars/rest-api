info:
  name: Create ›documents-lap-time‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/magazine-issues/{{validMagazineIssueId}}/relationships/documents-lap-time"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "documents-lap-time",
          "id": "{{validLapTimeId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        const LapTimes = require('./lib/node-types/LapTimes.js')
        await MagazineIssues.create()
        await LapTimes.create()

info:
  name: Delete ›belongs-to-magazine‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/magazine-issues/{{validMagazineIssueId}}/relationships/belongs-to-magazine"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "magazines",
          "id": "{{validMagazineId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        const Magazines = require('./lib/node-types/Magazines.js')
        await MagazineIssues.create()
        await Magazines.create()
        await MagazineIssues.createBelongsToMagazineRelationship()

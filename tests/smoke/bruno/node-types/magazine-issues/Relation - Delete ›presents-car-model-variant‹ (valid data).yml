info:
  name: Delete ›presents-car-model-variant‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/magazine-issues/{{validMagazineIssueId}}/relationships/presents-car-model-variant"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "car-model-variants",
          "id": "{{validCarModelVariantId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        await MagazineIssues.create()
        await CarModelVariants.create()
        await MagazineIssues.createPresentsCarModelVariantRelationship()

info:
  name: Create ›covers-car-model‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/magazine-issues/{{validMagazineIssueId}}/relationships/covers-car-model"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "covers-car-model",
          "id": "{{validCarModelId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        const CarModels = require('./lib/node-types/CarModels.js')
        await MagazineIssues.create()
        await CarModels.create()

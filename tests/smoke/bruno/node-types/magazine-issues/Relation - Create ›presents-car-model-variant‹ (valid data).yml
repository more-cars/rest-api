info:
  name: Create ›presents-car-model-variant‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/magazine-issues/{{validMagazineIssueId}}/relationships/presents-car-model-variant"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "presents-car-model-variant",
          "id": "{{validCarModelVariantId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        await MagazineIssues.create()
        await CarModelVariants.create()

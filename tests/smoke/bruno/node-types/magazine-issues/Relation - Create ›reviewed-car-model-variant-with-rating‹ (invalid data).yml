info:
  name: Create ›reviewed-car-model-variant-with-rating‹ relation (invalid data)
  type: http
  tags:
    - create
    - relation
    - invalid

http:
  method: POST
  url: "{{baseUrl}}/magazine-issues/{{invalidMagazineIssueId}}/reviewed-car-model-variant-with-rating/{{invalidRatingId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"
    - expression: res.body
      operator: isString
    - expression: res.body
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Ids = require('./lib/Ids.js')
        await Ids.generateInvalidId('MagazineIssue')
        await Ids.generateInvalidId('Rating')

info:
  name: Delete ›has-main-video‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/magazine-issues/{{validMagazineIssueId}}/has-main-video/{{validVideoId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        const Videos = require('./lib/node-types/Videos.js')
        await MagazineIssues.create()
        await Videos.create()
        await MagazineIssues.createHasMainVideoRelationship()

info:
  name: Get all ›reviewed-car-model-variant-with-rating‹ relations (valid data)
  type: http
  tags:
    - get
    - relation
    - collection
    - valid

http:
  method: GET
  url: "{{baseUrl}}/magazine-issues/{{validMagazineIssueId}}/reviewed-car-model-variant-with-rating"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isArray
    - expression: res.body.data[0].data.relationship_id
      operator: gte
      value: "12000000"
    - expression: res.body.data[0].data.relationship_name
      operator: eq
      value: "reviewed-car-model-variant-with-rating"
    - expression: res.body.data[0].data.start_node
      operator: isJson
    - expression: res.body.data[0].data.start_node.node_type
      operator: eq
      value: "magazine-issues"
    - expression: res.body.data[0].data.start_node.data.id
      operator: eq
      value: "{{validMagazineIssueId}}"
    - expression: res.body.data[0].data.partner_node
      operator: isJson
    - expression: res.body.data[0].data.partner_node.node_type
      operator: eq
      value: "ratings"
    - expression: res.body.data[0].data.partner_node.data.id
      operator: eq
      value: "{{validRatingId}}"
    - expression: res.body.data[0].data.created_at
      operator: isString
    - expression: res.body.data[0].data.created_at
      operator: isNotEmpty
    - expression: res.body.data[0].data.updated_at
      operator: isString
    - expression: res.body.data[0].data.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        const Ratings = require('./lib/node-types/Ratings.js')
        await MagazineIssues.create()
        await Ratings.create()
        await MagazineIssues.createReviewedCarModelVariantWithRatingRelationship()

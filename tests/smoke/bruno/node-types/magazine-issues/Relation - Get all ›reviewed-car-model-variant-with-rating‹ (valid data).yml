info:
  name: Get all ›reviewed-car-model-variant-with-rating‹ relations (valid data)
  type: http
  tags:
    - get
    - relation
    - collection
    - valid

http:
  method: GET
  url: "{{baseUrl}}/magazine-issues/{{validMagazineIssueId}}/reviewed-car-model-variant-with-rating"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isArray
    - expression: res.body.data[0].id
      operator: gte
      value: "12000000"
    - expression: res.body.data[0].type
      operator: eq
      value: "ratings"
    - expression: res.body.data[0].attributes
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/magazine-issues/{{validMagazineIssueId}}/reviewed-car-model-variant-with-rating"
    - expression: res.body.data[0].attributes.created_at
      operator: isString
    - expression: res.body.data[0].attributes.created_at
      operator: isNotEmpty
    - expression: res.body.data[0].attributes.updated_at
      operator: isString
    - expression: res.body.data[0].attributes.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        const Ratings = require('./lib/node-types/Ratings.js')
        await MagazineIssues.create()
        await Ratings.create()
        await MagazineIssues.createReviewedCarModelVariantWithRatingRelationship()

info:
  name: Delete ›reviewed-car-model-variant-with-rating‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/magazine-issues/{{validMagazineIssueId}}/reviewed-car-model-variant-with-rating/{{validRatingId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        const Ratings = require('./lib/node-types/Ratings.js')
        await MagazineIssues.create()
        await Ratings.create()
        await MagazineIssues.createReviewedCarModelVariantWithRatingRelationship()

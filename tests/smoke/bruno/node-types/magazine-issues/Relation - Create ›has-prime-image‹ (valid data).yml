info:
  name: Create ›has-prime-image‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/magazine-issues/{{validMagazineIssueId}}/relationships/has-prime-image"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "has-prime-image",
          "id": "{{validImageId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        const Images = require('./lib/node-types/Images.js')
        await MagazineIssues.create()
        await Images.create()
    - type: after-response
      code: |-
        const Images = require('./lib/node-types/Images.js')
        await Images.delete(bru.getEnvVar('validImageId'))

info:
  name: Delete ›covers-racing-event‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/magazine-issues/{{validMagazineIssueId}}/relationships/covers-racing-event"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "racing-events",
          "id": "{{validRacingEventId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        const RacingEvents = require('./lib/node-types/RacingEvents.js')
        await MagazineIssues.create()
        await RacingEvents.create()
        await MagazineIssues.createCoversRacingEventRelationship()

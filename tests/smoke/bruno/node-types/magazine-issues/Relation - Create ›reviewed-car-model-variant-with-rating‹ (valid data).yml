info:
  name: Create ›reviewed-car-model-variant-with-rating‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/magazine-issues/{{validMagazineIssueId}}/relationships/reviewed-car-model-variant-with-rating"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "ratings",
          "id": "{{validRatingId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        const Ratings = require('./lib/node-types/Ratings.js')
        await MagazineIssues.create()
        await Ratings.create()

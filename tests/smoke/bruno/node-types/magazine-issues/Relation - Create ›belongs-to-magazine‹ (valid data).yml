info:
  name: Create ›belongs-to-magazine‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/magazine-issues/{{validMagazineIssueId}}/relationships/belongs-to-magazine"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "belongs-to-magazine",
          "id": "{{validMagazineId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        const Magazines = require('./lib/node-types/Magazines.js')
        await MagazineIssues.create()
        await Magazines.create()

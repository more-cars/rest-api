info:
  name: Create ›is-followed-by-episode‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/programme-episodes/{{validProgrammeEpisodeId}}/relationships/is-followed-by-episode"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "is-followed-by-episode",
          "id": "{{validSecondProgrammeEpisodeId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const ProgrammeEpisodes = require('./lib/node-types/ProgrammeEpisodes.js')
        await ProgrammeEpisodes.create()
        await ProgrammeEpisodes.create('Second')

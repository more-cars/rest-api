info:
  name: Get ›belongs-to-programme‹ relation (valid data)
  type: http
  tags:
    - get
    - relation
    - valid

http:
  method: GET
  url: "{{baseUrl}}/programme-episodes/{{validProgrammeEpisodeId}}/belongs-to-programme"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/programme-episodes/{{validProgrammeEpisodeId}}/belongs-to-programme"
    - expression: res.body.data.attributes
      operator: isJson
    - expression: res.body.data.type
      operator: eq
      value: "programmes"
    - expression: res.body.data.id
      operator: eq
      value: "{{validProgrammeId}}"
    - expression: res.body.data.attributes.created_at
      operator: isString
    - expression: res.body.data.attributes.created_at
      operator: isNotEmpty
    - expression: res.body.data.attributes.updated_at
      operator: isString
    - expression: res.body.data.attributes.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const ProgrammeEpisodes = require('./lib/node-types/ProgrammeEpisodes.js')
        const Programmes = require('./lib/node-types/Programmes.js')
        await ProgrammeEpisodes.create()
        await Programmes.create()
        await ProgrammeEpisodes.createBelongsToProgrammeRelationship()

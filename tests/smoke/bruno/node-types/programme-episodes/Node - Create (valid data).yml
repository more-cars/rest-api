info:
  name: Create Programme Episode (valid data)
  type: http
  tags:
    - create
    - node
    - valid

http:
  method: POST
  url: "{{baseUrl}}/programme-episodes"
  body:
    type: json
    data: |-
      {
        "title": "The Falls Guys",
        "season_number": 2,
        "season_episode_number": 2,
        "original_air_date": "2017-12-08",
        "duration": "PT55M"
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.body
      operator: isJson
    - expression: res.body.id
      operator: gte
      value: "12000000"
  scripts:
    - type: tests
      code: |-
        test("both timestamps should be identical", function () {
          const data = res.getBody()
          expect(data.attributes.created_at).to.eql(data.attributes.updated_at)
        })

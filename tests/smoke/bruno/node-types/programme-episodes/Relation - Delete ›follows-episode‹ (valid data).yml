info:
  name: Delete ›follows-episode‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/programme-episodes/{{validProgrammeEpisodeId}}/follows-episode/{{validSecondProgrammeEpisodeId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const ProgrammeEpisodes = require('./lib/node-types/ProgrammeEpisodes.js')
        await ProgrammeEpisodes.create()
        await ProgrammeEpisodes.create('Second')
        await ProgrammeEpisodes.createFollowsEpisodeRelationship()

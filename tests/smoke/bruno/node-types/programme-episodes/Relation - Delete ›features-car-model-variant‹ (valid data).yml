info:
  name: Delete ›features-car-model-variant‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/programme-episodes/{{validProgrammeEpisodeId}}/features-car-model-variant/{{validCarModelVariantId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const ProgrammeEpisodes = require('./lib/node-types/ProgrammeEpisodes.js')
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        await ProgrammeEpisodes.create()
        await CarModelVariants.create()
        await ProgrammeEpisodes.createFeaturesCarModelVariantRelationship()

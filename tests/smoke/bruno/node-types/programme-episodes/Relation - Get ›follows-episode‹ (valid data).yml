info:
  name: Get ›follows-episode‹ relation (valid data)
  type: http
  tags:
    - get
    - relation
    - valid

http:
  method: GET
  url: "{{baseUrl}}/programme-episodes/{{validProgrammeEpisodeId}}/follows-episode"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.data.relationship_id
      operator: gte
      value: "12000000"
    - expression: res.body.data.relationship_name
      operator: eq
      value: "follows-episode"
    - expression: res.body.data.start_node
      operator: isJson
    - expression: res.body.data.start_node.node_type
      operator: eq
      value: "programme-episodes"
    - expression: res.body.data.start_node.data.id
      operator: eq
      value: "{{validProgrammeEpisodeId}}"
    - expression: res.body.data.partner_node
      operator: isJson
    - expression: res.body.data.partner_node.node_type
      operator: eq
      value: "programme-episodes"
    - expression: res.body.data.partner_node.data.id
      operator: eq
      value: "{{validProgrammeEpisodeId}}"
    - expression: res.body.data.created_at
      operator: isString
    - expression: res.body.data.created_at
      operator: isNotEmpty
    - expression: res.body.data.updated_at
      operator: isString
    - expression: res.body.data.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const ProgrammeEpisodes = require('./lib/node-types/ProgrammeEpisodes.js')
        const ProgrammeEpisodes = require('./lib/node-types/ProgrammeEpisodes.js')
        await ProgrammeEpisodes.create()
        await ProgrammeEpisodes.create()
        await ProgrammeEpisodes.createFollowsEpisodeRelationship()

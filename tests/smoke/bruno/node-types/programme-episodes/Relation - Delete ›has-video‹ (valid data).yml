info:
  name: Delete ›has-video‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/programme-episodes/{{validProgrammeEpisodeId}}/relationships/has-video"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "has-video",
          "id": "{{validVideoId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const ProgrammeEpisodes = require('./lib/node-types/ProgrammeEpisodes.js')
        const Videos = require('./lib/node-types/Videos.js')
        await ProgrammeEpisodes.create()
        await Videos.create()
        await ProgrammeEpisodes.createHasVideoRelationship()
    - type: after-response
      code: |-
        const Videos = require('./lib/node-types/Videos.js')
        await Videos.delete(bru.getEnvVar('validVideoId'))

info:
  name: Get all ›features-car-model-variant‹ relations (valid data)
  type: http
  tags:
    - get
    - relation
    - collection
    - valid

http:
  method: GET
  url: "{{baseUrl}}/programme-episodes/{{validProgrammeEpisodeId}}/features-car-model-variant"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isArray
    - expression: res.body.data[0].data.relationship_id
      operator: gte
      value: "12000000"
    - expression: res.body.data[0].data.relationship_name
      operator: eq
      value: "features-car-model-variant"
    - expression: res.body.data[0].data.start_node
      operator: isJson
    - expression: res.body.data[0].data.start_node.node_type
      operator: eq
      value: "programme-episodes"
    - expression: res.body.data[0].data.start_node.data.id
      operator: eq
      value: "{{validProgrammeEpisodeId}}"
    - expression: res.body.data[0].data.partner_node
      operator: isJson
    - expression: res.body.data[0].data.partner_node.node_type
      operator: eq
      value: "car-model-variants"
    - expression: res.body.data[0].data.partner_node.data.id
      operator: eq
      value: "{{validCarModelVariantId}}"
    - expression: res.body.data[0].data.created_at
      operator: isString
    - expression: res.body.data[0].data.created_at
      operator: isNotEmpty
    - expression: res.body.data[0].data.updated_at
      operator: isString
    - expression: res.body.data[0].data.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const ProgrammeEpisodes = require('./lib/node-types/ProgrammeEpisodes.js')
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        await ProgrammeEpisodes.create()
        await CarModelVariants.create()
        await ProgrammeEpisodes.createFeaturesCarModelVariantRelationship()

info:
  name: Delete ›belongs-to-programme‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/programme-episodes/{{validProgrammeEpisodeId}}/belongs-to-programme/{{validProgrammeId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const ProgrammeEpisodes = require('./lib/node-types/ProgrammeEpisodes.js')
        const Programmes = require('./lib/node-types/Programmes.js')
        await ProgrammeEpisodes.create()
        await Programmes.create()
        await ProgrammeEpisodes.createBelongsToProgrammeRelationship()

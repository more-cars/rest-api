info:
  name: Delete ›covers-car-model‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/programme-episodes/{{validProgrammeEpisodeId}}/covers-car-model/{{validCarModelId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const ProgrammeEpisodes = require('./lib/node-types/ProgrammeEpisodes.js')
        const CarModels = require('./lib/node-types/CarModels.js')
        await ProgrammeEpisodes.create()
        await CarModels.create()
        await ProgrammeEpisodes.createCoversCarModelRelationship()

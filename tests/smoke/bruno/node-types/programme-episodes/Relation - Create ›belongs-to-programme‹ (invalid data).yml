info:
  name: Create ›belongs-to-programme‹ relation (invalid data)
  type: http
  tags:
    - create
    - relation
    - invalid

http:
  method: POST
  url: "{{baseUrl}}/programme-episodes/{{invalidProgrammeEpisodeId}}/relationships/belongs-to-programme"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"
    - expression: res.body.errors
      operator: isArray
    - expression: res.body.errors[0].status
      operator: isNotEmpty
    - expression: res.body.errors[0].title
      operator: isNotEmpty
    - expression: res.body.errors[0].detail
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Ids = require('./lib/Ids.js')
        await Ids.generateInvalidId('ProgrammeEpisode')
        await Ids.generateInvalidId('Programme')

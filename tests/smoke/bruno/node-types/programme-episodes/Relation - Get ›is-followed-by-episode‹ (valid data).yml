info:
  name: Get ›is-followed-by-episode‹ relation (valid data)
  type: http
  tags:
    - get
    - relation
    - valid

http:
  method: GET
  url: "{{baseUrl}}/programme-episodes/{{validProgrammeEpisodeId}}/is-followed-by-episode"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/programme-episodes/{{validProgrammeEpisodeId}}/is-followed-by-episode"
    - expression: res.body.data.attributes
      operator: isJson
    - expression: res.body.data.type
      operator: eq
      value: "programme-episodes"
    - expression: res.body.data.id
      operator: eq
      value: "{{validSecondProgrammeEpisodeId}}"
    - expression: res.body.data.attributes.created_at
      operator: isString
    - expression: res.body.data.attributes.created_at
      operator: isNotEmpty
    - expression: res.body.data.attributes.updated_at
      operator: isString
    - expression: res.body.data.attributes.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const ProgrammeEpisodes = require('./lib/node-types/ProgrammeEpisodes.js')
        await ProgrammeEpisodes.create()
        await ProgrammeEpisodes.create('Second')
        await ProgrammeEpisodes.createIsFollowedByEpisodeRelationship()

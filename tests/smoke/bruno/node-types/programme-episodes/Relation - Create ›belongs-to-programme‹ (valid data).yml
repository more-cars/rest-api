info:
  name: Create ›belongs-to-programme‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/programme-episodes/{{validProgrammeEpisodeId}}/relationships/belongs-to-programme"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "belongs-to-programme",
          "id": "{{validProgrammeId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const ProgrammeEpisodes = require('./lib/node-types/ProgrammeEpisodes.js')
        const Programmes = require('./lib/node-types/Programmes.js')
        await ProgrammeEpisodes.create()
        await Programmes.create()

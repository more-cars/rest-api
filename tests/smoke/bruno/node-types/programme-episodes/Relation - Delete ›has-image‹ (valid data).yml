info:
  name: Delete ›has-image‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/programme-episodes/{{validProgrammeEpisodeId}}/has-image/{{validImageId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const ProgrammeEpisodes = require('./lib/node-types/ProgrammeEpisodes.js')
        const Images = require('./lib/node-types/Images.js')
        await ProgrammeEpisodes.create()
        await Images.create()
        await ProgrammeEpisodes.createHasImageRelationship()
    - type: after-response
      code: |-
        const Images = require('./lib/node-types/Images.js')
        await Images.delete(bru.getEnvVar('validImageId'))

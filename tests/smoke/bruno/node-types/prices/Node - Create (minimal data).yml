info:
  name: Create Price (minimal data)
  type: http
  tags:
    - create
    - node
    - valid

http:
  method: POST
  url: "{{baseUrl}}/prices"
  body:
    type: json
    data: |-
      {
        "price": 59990,
        "price_year": 2020,
        "currency_code": "EUR",
        "country_code": "DE"
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.headers["content-type"]
      operator: contains
      value: application/vnd.api+json
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
    - expression: res.body
      operator: isJson
    - expression: res.body.id
      operator: gte
      value: "12000000"

info:
  name: Create Price (ignored data)
  type: http
  tags:
    - create
    - node
    - valid

http:
  method: POST
  url: "{{baseUrl}}/prices"
  body:
    type: json
    data: |-
      {
        "price": 59990,
        "price_year": 2020,
        "currency_code": "EUR",
        "country_code": "DE",
        "created_at": "nope",
        "updated_at": "nonono"
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.body.attributes.created_at
      operator: neq
      value: nope
    - expression: res.body.attributes.updated_at
      operator: neq
      value: nonono

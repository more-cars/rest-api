info:
  name: Update Price (invalid data)
  type: http
  tags:
    - update
    - node
    - invalid

http:
  method: PATCH
  url: "{{baseUrl}}/prices/{{validPriceId}}"
  body:
    type: json
    data: |-
      {
        "price": null
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body.errors
      operator: isArray
    - expression: res.body.errors[0].status
      operator: isNotEmpty
    - expression: res.body.errors[0].title
      operator: isNotEmpty
    - expression: res.body.errors[0].detail
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Prices = require('./lib/node-types/Prices.js')
        await Prices.create()

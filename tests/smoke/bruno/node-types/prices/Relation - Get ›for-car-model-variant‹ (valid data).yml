info:
  name: Get ›for-car-model-variant‹ relation (valid data)
  type: http
  tags:
    - get
    - relation
    - valid

http:
  method: GET
  url: "{{baseUrl}}/prices/{{validPriceId}}/for-car-model-variant"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.data.id
      operator: gte
      value: "12000000"
    - expression: res.body.data.type
      operator: eq
      value: "car-model-variants"
    - expression: res.body.data.attributes
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/prices/{{validPriceId}}/for-car-model-variant"
    - expression: res.body.data.attributes.created_at
      operator: isString
    - expression: res.body.data.attributes.created_at
      operator: isNotEmpty
    - expression: res.body.data.attributes.updated_at
      operator: isString
    - expression: res.body.data.attributes.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Prices = require('./lib/node-types/Prices.js')
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        await Prices.create()
        await CarModelVariants.create()
        await Prices.createForCarModelVariantRelationship()

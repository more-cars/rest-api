info:
  name: Update Car Model Variant (valid data)
  type: http
  tags:
    - update
    - node
    - valid

http:
  method: PATCH
  url: "{{baseUrl}}/car-model-variants/{{validCarModelVariantId}}"
  body:
    type: json
    data: |-
      {
        "name": "BMW M3 - Updated",
        "internal_code": "E46 - Updated",
        "built_from": 2002,
        "built_to": 2008,
        "body_style": "convertible",
        "drag_coefficient": 2.31,
        "doors": 4,
        "weight": 1551,
        "weight_unit": "kg",
        "max_power": 345,
        "max_power_unit": "PS",
        "max_torque": 367,
        "max_torque_unit": "Nm",
        "cylinders": 8,
        "engine_configuration": "V",
        "displacement": 3248,
        "displacement_unit": "ccm",
        "air_induction": "turbo",
        "engine_type": "otto",
        "energy_source": "petrol",
        "energy_source_2": null,
        "consumption": 13.9,
        "consumption_unit": "l / 100 km",
        "consumption_2": null,
        "consumption_2_unit": null,
        "energy_capacity": 65,
        "energy_capacity_unit": "l",
        "energy_capacity_2": null,
        "energy_capacity_2_unit": null,
        "transmission": "sequential",
        "gears": 8,
        "drivetrain": "RWD",
        "sprint_time_0_100_kmh": 7.2,
        "top_speed": 252,
        "top_speed_unit": "km/h",
        "total_production": 50002
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.id
      operator: eq
      value: "{{validCarModelVariantId}}"
  scripts:
    - type: before-request
      code: |-
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        await CarModelVariants.create()
    - type: tests
      code: |-
        test("response should return the intended record", function () {
          const data = res.getBody()
          expect(data.id).to.eql(bru.getEnvVar('validCarModelVariantId'))
        })
        test("both timestamps should be different", function () {
          const data = res.getBody()
          expect(data.attributes.created_at).to.not.eql(data.attributes.updated_at)
        })

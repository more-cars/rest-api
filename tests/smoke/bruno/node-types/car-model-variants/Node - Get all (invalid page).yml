info:
  name: Get all Car Model Variants (invalid page)
  type: http
  tags:
    - get
    - node
    - collection
    - pagination
    - invalid

http:
  method: GET
  url: "{{baseUrl}}/car-model-variants?page=-2"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.headers["content-type"]
      operator: contains
      value: application/vnd.api+json
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
    - expression: res.body.errors
      operator: isArray
    - expression: res.body.errors[0].status
      operator: isNotEmpty
    - expression: res.body.errors[0].title
      operator: isNotEmpty
    - expression: res.body.errors[0].detail
      operator: isNotEmpty

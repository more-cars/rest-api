info:
  name: Create ›reviewed-by-magazine-issue-with-rating‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/car-model-variants/{{validCarModelVariantId}}/relationships/reviewed-by-magazine-issue-with-rating"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "reviewed-by-magazine-issue-with-rating",
          "id": "{{validRatingId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        const Ratings = require('./lib/node-types/Ratings.js')
        await CarModelVariants.create()
        await Ratings.create()

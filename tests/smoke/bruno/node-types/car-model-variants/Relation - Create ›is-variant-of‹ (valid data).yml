info:
  name: Create ›is-variant-of‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/car-model-variants/{{validCarModelVariantId}}/relationships/is-variant-of"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "is-variant-of",
          "id": "{{validCarModelId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        const CarModels = require('./lib/node-types/CarModels.js')
        await CarModelVariants.create()
        await CarModels.create()

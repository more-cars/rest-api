info:
  name: Delete ›featured-in-programme-episode‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/car-model-variants/{{validCarModelVariantId}}/featured-in-programme-episode/{{validProgrammeEpisodeId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        const ProgrammeEpisodes = require('./lib/node-types/ProgrammeEpisodes.js')
        await CarModelVariants.create()
        await ProgrammeEpisodes.create()
        await CarModelVariants.createFeaturedInProgrammeEpisodeRelationship()

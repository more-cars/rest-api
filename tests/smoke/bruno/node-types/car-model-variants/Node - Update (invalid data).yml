info:
  name: Update Car Model Variant (invalid data)
  type: http
  tags:
    - update
    - node
    - invalid

http:
  method: PATCH
  url: "{{baseUrl}}/car-model-variants/{{validCarModelVariantId}}"
  body:
    type: json
    data: |-
      {
        "name": null
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body.errors
      operator: isArray
    - expression: res.body.errors[0].status
      operator: isNotEmpty
    - expression: res.body.errors[0].title
      operator: isNotEmpty
    - expression: res.body.errors[0].detail
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        await CarModelVariants.create()

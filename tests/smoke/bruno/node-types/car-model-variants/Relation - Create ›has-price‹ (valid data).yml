info:
  name: Create ›has-price‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/car-model-variants/{{validCarModelVariantId}}/relationships/has-price"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "has-price",
          "id": "{{validPriceId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        const Prices = require('./lib/node-types/Prices.js')
        await CarModelVariants.create()
        await Prices.create()

info:
  name: Delete ›has-price‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/car-model-variants/{{validCarModelVariantId}}/has-price/{{validPriceId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        const Prices = require('./lib/node-types/Prices.js')
        await CarModelVariants.create()
        await Prices.create()
        await CarModelVariants.createHasPriceRelationship()

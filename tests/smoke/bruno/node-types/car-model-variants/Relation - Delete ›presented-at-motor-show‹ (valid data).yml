info:
  name: Delete ›presented-at-motor-show‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/car-model-variants/{{validCarModelVariantId}}/relationships/presented-at-motor-show"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "motor-shows",
          "id": "{{validMotorShowId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        const MotorShows = require('./lib/node-types/MotorShows.js')
        await CarModelVariants.create()
        await MotorShows.create()
        await CarModelVariants.createPresentedAtMotorShowRelationship()

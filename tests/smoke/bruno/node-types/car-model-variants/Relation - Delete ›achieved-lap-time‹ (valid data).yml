info:
  name: Delete ›achieved-lap-time‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/car-model-variants/{{validCarModelVariantId}}/relationships/achieved-lap-time"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "achieved-lap-time",
          "id": "{{validLapTimeId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        const LapTimes = require('./lib/node-types/LapTimes.js')
        await CarModelVariants.create()
        await LapTimes.create()
        await CarModelVariants.createAchievedLapTimeRelationship()

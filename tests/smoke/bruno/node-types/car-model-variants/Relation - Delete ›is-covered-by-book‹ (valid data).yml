info:
  name: Delete ›is-covered-by-book‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/car-model-variants/{{validCarModelVariantId}}/relationships/is-covered-by-book"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "is-covered-by-book",
          "id": "{{validBookId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        const Books = require('./lib/node-types/Books.js')
        await CarModelVariants.create()
        await Books.create()
        await CarModelVariants.createIsCoveredByBookRelationship()

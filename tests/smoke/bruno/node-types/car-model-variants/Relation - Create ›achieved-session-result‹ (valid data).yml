info:
  name: Create ›achieved-session-result‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/car-model-variants/{{validCarModelVariantId}}/relationships/achieved-session-result"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "achieved-session-result",
          "id": "{{validSessionResultId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        const SessionResults = require('./lib/node-types/SessionResults.js')
        await CarModelVariants.create()
        await SessionResults.create()

info:
  name: Create ›has-scale-model‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/car-model-variants/{{validCarModelVariantId}}/relationships/has-scale-model"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "model-cars",
          "id": "{{validModelCarId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        const ModelCars = require('./lib/node-types/ModelCars.js')
        await CarModelVariants.create()
        await ModelCars.create()

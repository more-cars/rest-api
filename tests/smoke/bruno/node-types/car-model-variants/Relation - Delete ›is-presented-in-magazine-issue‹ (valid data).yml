info:
  name: Delete ›is-presented-in-magazine-issue‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/car-model-variants/{{validCarModelVariantId}}/relationships/is-presented-in-magazine-issue"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "is-presented-in-magazine-issue",
          "id": "{{validMagazineIssueId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const CarModelVariants = require('./lib/node-types/CarModelVariants.js')
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        await CarModelVariants.create()
        await MagazineIssues.create()
        await CarModelVariants.createIsPresentedInMagazineIssueRelationship()

info:
  name: Get all Companies
  type: http
  tags:
    - get
    - node
    - collection
    - valid

http:
  method: GET
  url: "{{baseUrl}}/companies"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.data
      operator: isArray
    - expression: res.body.data[0].attributes
      operator: isJson
    - expression: res.body.data[0].id
      operator: gte
      value: "12000000"
    - expression: res.body.meta.page.current
      operator: isNumber
    - expression: res.body.meta.page.size
      operator: isNumber
    - expression: res.body.meta.page.total_pages
      operator: isNumber
    - expression: res.body.meta.page.total_nodes
      operator: isNumber
    - expression: res.body.meta.links.self
      operator: isString
    - expression: res.body.meta.links.first
      operator: isString
  scripts:
    - type: before-request
      code: |-
        const Companies = require('./lib/node-types/Companies.js')
        await Companies.create()

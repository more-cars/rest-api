info:
  name: Get all ›has-brand‹ relations (valid data)
  type: http
  tags:
    - get
    - relation
    - collection
    - valid

http:
  method: GET
  url: "{{baseUrl}}/companies/{{validCompanyId}}/has-brand"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isArray
    - expression: res.body.data[0].id
      operator: gte
      value: "12000000"
    - expression: res.body.data[0].type
      operator: eq
      value: "brands"
    - expression: res.body.data[0].attributes
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/companies/{{validCompanyId}}/has-brand"
    - expression: res.body.data[0].attributes.created_at
      operator: isString
    - expression: res.body.data[0].attributes.created_at
      operator: isNotEmpty
    - expression: res.body.data[0].attributes.updated_at
      operator: isString
    - expression: res.body.data[0].attributes.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Companies = require('./lib/node-types/Companies.js')
        const Brands = require('./lib/node-types/Brands.js')
        await Companies.create()
        await Brands.create()
        await Companies.createHasBrandRelationship()

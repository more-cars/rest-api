info:
  name: Delete ›has-prime-image‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/books/{{validBookId}}/relationships/has-prime-image"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "has-prime-image",
          "id": "{{validImageId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const Books = require('./lib/node-types/Books.js')
        const Images = require('./lib/node-types/Images.js')
        await Books.create()
        await Images.create()
        await Books.createHasPrimeImageRelationship()
    - type: after-response
      code: |-
        const Images = require('./lib/node-types/Images.js')
        await Images.delete(bru.getEnvVar('validImageId'))

info:
  name: Delete ›has-image‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/books/{{validBookId}}/has-image/{{validImageId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const Books = require('./lib/node-types/Books.js')
        const Images = require('./lib/node-types/Images.js')
        await Books.create()
        await Images.create()
        await Books.createHasImageRelationship()

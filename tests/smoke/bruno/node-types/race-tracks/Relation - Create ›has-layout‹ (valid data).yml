info:
  name: Create ›has-layout‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/race-tracks/{{validRaceTrackId}}/relationships/has-layout"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "has-layout",
          "id": "{{validTrackLayoutId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const RaceTracks = require('./lib/node-types/RaceTracks.js')
        const TrackLayouts = require('./lib/node-types/TrackLayouts.js')
        await RaceTracks.create()
        await TrackLayouts.create()

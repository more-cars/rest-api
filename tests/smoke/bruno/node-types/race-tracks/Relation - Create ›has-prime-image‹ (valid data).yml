info:
  name: Create ›has-prime-image‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/race-tracks/{{validRaceTrackId}}/relationships/has-prime-image"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "images",
          "id": "{{validImageId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const RaceTracks = require('./lib/node-types/RaceTracks.js')
        const Images = require('./lib/node-types/Images.js')
        await RaceTracks.create()
        await Images.create()
    - type: after-response
      code: |-
        const Images = require('./lib/node-types/Images.js')
        await Images.delete(bru.getEnvVar('validImageId'))

info:
  name: Create ›belongs-to-racing-event‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/racing-sessions/{{validRacingSessionId}}/relationships/belongs-to-racing-event"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "racing-events",
          "id": "{{validRacingEventId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const RacingSessions = require('./lib/node-types/RacingSessions.js')
        const RacingEvents = require('./lib/node-types/RacingEvents.js')
        await RacingSessions.create()
        await RacingEvents.create()

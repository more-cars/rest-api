info:
  name: Get ›has-main-video‹ relation (valid data)
  type: http
  tags:
    - get
    - relation
    - valid

http:
  method: GET
  url: "{{baseUrl}}/racing-sessions/{{validRacingSessionId}}/has-main-video"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers["content-type"]
      operator: contains
      value: application/vnd.api+json
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.data.id
      operator: gte
      value: "12000000"
    - expression: res.body.data.type
      operator: eq
      value: "videos"
    - expression: res.body.data.attributes
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/racing-sessions/{{validRacingSessionId}}/has-main-video"
    - expression: res.body.data.attributes.created_at
      operator: isString
    - expression: res.body.data.attributes.created_at
      operator: isNotEmpty
    - expression: res.body.data.attributes.updated_at
      operator: isString
    - expression: res.body.data.attributes.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const RacingSessions = require('./lib/node-types/RacingSessions.js')
        const Videos = require('./lib/node-types/Videos.js')
        await RacingSessions.create()
        await Videos.create()
        await RacingSessions.createHasMainVideoRelationship()
    - type: after-response
      code: |-
        const Videos = require('./lib/node-types/Videos.js')
        await Videos.delete(bru.getEnvVar('validVideoId'))

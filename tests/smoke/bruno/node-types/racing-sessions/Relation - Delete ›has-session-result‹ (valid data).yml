info:
  name: Delete ›has-session-result‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/racing-sessions/{{validRacingSessionId}}/relationships/has-session-result"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "session-results",
          "id": "{{validSessionResultId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const RacingSessions = require('./lib/node-types/RacingSessions.js')
        const SessionResults = require('./lib/node-types/SessionResults.js')
        await RacingSessions.create()
        await SessionResults.create()
        await RacingSessions.createHasSessionResultRelationship()

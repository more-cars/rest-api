info:
  name: Delete ›created-model-car‹ relation (invalid data)
  type: http
  tags:
    - delete
    - relation
    - invalid

http:
  method: DELETE
  url: "{{baseUrl}}/model-car-brands/{{invalidModelCarBrandId}}/created-model-car/{{invalidModelCarId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"
    - expression: res.body
      operator: isString
    - expression: res.body
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Ids = require('./lib/Ids.js')
        await Ids.generateInvalidId('ModelCarBrand')
        await Ids.generateInvalidId('ModelCar')

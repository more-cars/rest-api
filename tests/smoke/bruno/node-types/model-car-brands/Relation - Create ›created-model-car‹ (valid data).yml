info:
  name: Create ›created-model-car‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/model-car-brands/{{validModelCarBrandId}}/relationships/created-model-car"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "model-cars",
          "id": "{{validModelCarId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const ModelCarBrands = require('./lib/node-types/ModelCarBrands.js')
        const ModelCars = require('./lib/node-types/ModelCars.js')
        await ModelCarBrands.create()
        await ModelCars.create()

info:
  name: Delete ›has-prime-image‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/model-car-brands/{{validModelCarBrandId}}/has-prime-image/{{validImageId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  scripts:
    - type: before-request
      code: |-
        const ModelCarBrands = require('./lib/node-types/ModelCarBrands.js')
        const Images = require('./lib/node-types/Images.js')
        await ModelCarBrands.create()
        await Images.create()
        await ModelCarBrands.createHasPrimeImageRelationship()
    - type: after-response
      code: |-
        const Images = require('./lib/node-types/Images.js')
        await Images.delete(bru.getEnvVar('validImageId'))

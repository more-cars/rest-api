info:
  name: Get all ›created-model-car‹ relations (valid data)
  type: http
  tags:
    - get
    - relation
    - collection
    - valid

http:
  method: GET
  url: "{{baseUrl}}/model-car-brands/{{validModelCarBrandId}}/created-model-car"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isArray
    - expression: res.body.data[0].data.relationship_id
      operator: gte
      value: "12000000"
    - expression: res.body.data[0].data.relationship_name
      operator: eq
      value: "created-model-car"
    - expression: res.body.data[0].data.start_node
      operator: isJson
    - expression: res.body.data[0].data.start_node.node_type
      operator: eq
      value: "model-car-brands"
    - expression: res.body.data[0].data.start_node.data.id
      operator: eq
      value: "{{validModelCarBrandId}}"
    - expression: res.body.data[0].data.partner_node
      operator: isJson
    - expression: res.body.data[0].data.partner_node.node_type
      operator: eq
      value: "model-cars"
    - expression: res.body.data[0].data.partner_node.data.id
      operator: eq
      value: "{{validModelCarId}}"
    - expression: res.body.data[0].data.created_at
      operator: isString
    - expression: res.body.data[0].data.created_at
      operator: isNotEmpty
    - expression: res.body.data[0].data.updated_at
      operator: isString
    - expression: res.body.data[0].data.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const ModelCarBrands = require('./lib/node-types/ModelCarBrands.js')
        const ModelCars = require('./lib/node-types/ModelCars.js')
        await ModelCarBrands.create()
        await ModelCars.create()
        await ModelCarBrands.createCreatedModelCarRelationship()

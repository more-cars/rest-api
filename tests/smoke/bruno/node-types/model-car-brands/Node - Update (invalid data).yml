info:
  name: Update Model Car Brand (invalid data)
  type: http
  tags:
    - update
    - node
    - invalid

http:
  method: PATCH
  url: "{{baseUrl}}/model-car-brands/{{validModelCarBrandId}}"
  body:
    type: json
    data: |-
      {
        "name": null
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body
      operator: isString
  scripts:
    - type: before-request
      code: |-
        const ModelCarBrands = require('./lib/node-types/ModelCarBrands.js')
        await ModelCarBrands.create()

info:
  name: Get ›belongs-to-racing-series‹ relation (valid data)
  type: http
  tags:
    - get
    - relation
    - valid

http:
  method: GET
  url: "{{baseUrl}}/racing-events/{{validRacingEventId}}/belongs-to-racing-series"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers["content-type"]
      operator: contains
      value: application/vnd.api+json
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/racing-events/{{validRacingEventId}}/belongs-to-racing-series"
    - expression: res.body.data.attributes
      operator: isJson
    - expression: res.body.data.type
      operator: eq
      value: "racing-series"
    - expression: res.body.data.id
      operator: eq
      value: "{{validRacingSeriesId}}"
    - expression: res.body.data.attributes.created_at
      operator: isString
    - expression: res.body.data.attributes.created_at
      operator: isNotEmpty
    - expression: res.body.data.attributes.updated_at
      operator: isString
    - expression: res.body.data.attributes.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const RacingEvents = require('./lib/node-types/RacingEvents.js')
        const RacingSeries = require('./lib/node-types/RacingSeries.js')
        await RacingEvents.create()
        await RacingSeries.create()
        await RacingEvents.createBelongsToRacingSeriesRelationship()

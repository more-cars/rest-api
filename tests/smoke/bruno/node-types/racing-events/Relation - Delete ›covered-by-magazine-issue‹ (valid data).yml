info:
  name: Delete ›covered-by-magazine-issue‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/racing-events/{{validRacingEventId}}/relationships/covered-by-magazine-issue"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "covered-by-magazine-issue",
          "id": "{{validMagazineIssueId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const RacingEvents = require('./lib/node-types/RacingEvents.js')
        const MagazineIssues = require('./lib/node-types/MagazineIssues.js')
        await RacingEvents.create()
        await MagazineIssues.create()
        await RacingEvents.createCoveredByMagazineIssueRelationship()

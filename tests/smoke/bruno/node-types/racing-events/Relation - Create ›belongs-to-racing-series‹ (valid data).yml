info:
  name: Create ›belongs-to-racing-series‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/racing-events/{{validRacingEventId}}/relationships/belongs-to-racing-series"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "racing-series",
          "id": "{{validRacingSeriesId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const RacingEvents = require('./lib/node-types/RacingEvents.js')
        const RacingSeries = require('./lib/node-types/RacingSeries.js')
        await RacingEvents.create()
        await RacingSeries.create()

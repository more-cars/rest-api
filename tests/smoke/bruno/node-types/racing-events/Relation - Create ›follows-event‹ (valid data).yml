info:
  name: Create ›follows-event‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/racing-events/{{validRacingEventId}}/relationships/follows-event"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "follows-event",
          "id": "{{validSecondRacingEventId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const RacingEvents = require('./lib/node-types/RacingEvents.js')
        await RacingEvents.create()
        await RacingEvents.create('Second')

info:
  name: Create ›has-racing-session‹ relation (valid data)
  type: http
  tags:
    - create
    - relation
    - valid

http:
  method: POST
  url: "{{baseUrl}}/racing-events/{{validRacingEventId}}/relationships/has-racing-session"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "has-racing-session",
          "id": "{{validRacingSessionId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const RacingEvents = require('./lib/node-types/RacingEvents.js')
        const RacingSessions = require('./lib/node-types/RacingSessions.js')
        await RacingEvents.create()
        await RacingSessions.create()

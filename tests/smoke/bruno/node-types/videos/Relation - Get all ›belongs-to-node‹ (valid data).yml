info:
  name: Get all ›belongs-to-node‹ relations (valid data)
  type: http
  tags:
    - get
    - relation
    - collection
    - valid

http:
  method: GET
  url: "{{baseUrl}}/videos/{{validVideoId}}/belongs-to-node"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.data
      operator: isArray
    - expression: res.body.data[0].id
      operator: gte
      value: "12000000"
    - expression: res.body.data[0].type
      operator: eq
      value: "brands"
    - expression: res.body.data[0].attributes
      operator: isJson
    - expression: res.body.links.self
      operator: eq
      value: "/videos/{{validVideoId}}/belongs-to-node"
    - expression: res.body.data[0].attributes.created_at
      operator: isString
    - expression: res.body.data[0].attributes.created_at
      operator: isNotEmpty
    - expression: res.body.data[0].attributes.updated_at
      operator: isString
    - expression: res.body.data[0].attributes.updated_at
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Videos = require('./lib/node-types/Videos.js')
        const Brands = require('./lib/node-types/Brands.js')
        await Videos.create()
        await Brands.create()
        bru.setEnvVar('validNodeId', bru.getEnvVar('validBrandId'))
        await Videos.createBelongsToNodeRelationship()
    - type: after-response
      code: |-
        const Videos = require('./lib/node-types/Videos.js')
        await Videos.delete(bru.getEnvVar('validVideoId'))

info:
  name: Delete ›belongs-to-node‹ relation (valid data)
  type: http
  tags:
    - delete
    - relation
    - valid

http:
  method: DELETE
  url: "{{baseUrl}}/videos/{{validVideoId}}/relationships/belongs-to-node"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "nodes",
          "id": "{{validNodeId}}"
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["cache-control"]
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Videos = require('./lib/node-types/Videos.js')
        const Brands = require('./lib/node-types/Brands.js')
        await Videos.create()
        await Brands.create()
        bru.setEnvVar('validNodeId', bru.getEnvVar('validBrandId'))
        await Videos.createBelongsToNodeRelationship()
    - type: after-response
      code: |-
        const Videos = require('./lib/node-types/Videos.js')
        await Videos.delete(bru.getEnvVar('validVideoId'))

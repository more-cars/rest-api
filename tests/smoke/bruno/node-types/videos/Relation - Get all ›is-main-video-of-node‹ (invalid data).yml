info:
  name: Get all ›is-main-video-of-node‹ relations (invalid data)
  type: http
  tags:
    - get
    - relation
    - collection
    - invalid

http:
  method: GET
  url: "{{baseUrl}}/videos/{{invalidVideoId}}/is-main-video-of-node"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"
    - expression: res.body
      operator: isString
    - expression: res.body
      operator: isNotEmpty
  scripts:
    - type: before-request
      code: |-
        const Ids = require('./lib/Ids.js')
        await Ids.generateInvalidId('Video')

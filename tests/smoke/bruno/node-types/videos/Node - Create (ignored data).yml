info:
  name: Create Video (ignored data)
  type: http
  tags:
    - create
    - node
    - valid

http:
  method: POST
  url: "{{baseUrl}}/videos"
  body:
    type: json
    data: |-
      {
        "video_provider": "youtube",
        "external_id": "NqsBncRslsg",
        "created_at": "nope",
        "updated_at": "nonono"
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.body.attributes.created_at
      operator: neq
      value: nope
    - expression: res.body.attributes.updated_at
      operator: neq
      value: nonono
